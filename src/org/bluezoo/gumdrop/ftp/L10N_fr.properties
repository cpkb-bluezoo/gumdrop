log.transfer_starting=Démarrage du transfert FTP {0} de {1} ({2} octets) pour l'utilisateur {3}
log.transfer_progress=Progrès du transfert FTP: {0} octets sur {1}
log.transfer_completed=Transfert FTP {0}: {1} de {2} ({3} octets) pour l'utilisateur {4}
log.transfer_failed=Échec du transfert FTP: {0} de {1} pour l'utilisateur {2}
log.connection_closed=Connexion FTP fermée depuis {0} (utilisateur: {1}, durée: {2}ms)
log.site_command=Commande FTP SITE depuis {0}: {1}
log.directory_changed=Répertoire FTP modifié vers {0} par l'utilisateur {1}
log.file_operation=Opération FTP {0} sur {1} par l'utilisateur {2}: {3}
log.passive_mode_enabled=Mode passif FTP activé sur le port {0} pour {1}
