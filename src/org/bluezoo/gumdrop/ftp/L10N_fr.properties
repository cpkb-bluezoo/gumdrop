# Messages de réponse du serveur FTP (envoyés aux clients FTP)
ftp.welcome_banner=220 Serveur FTP prêt
ftp.goodbye=221 Au revoir
ftp.command_ok=250 Commande réussie
ftp.user_ok_need_password=331 Nom d'utilisateur correct, mot de passe requis
ftp.user_ok_need_account=332 Compte requis pour la connexion
ftp.login_successful=230 Utilisateur connecté, continuez
ftp.transfer_starting=150 Ouverture de la connexion de données
ftp.transfer_complete=226 Transfert terminé
ftp.entering_passive=227 Passage en mode passif ({0})
ftp.directory_changed=250 Répertoire modifié avec succès
ftp.directory_created=257 "{0}" créé
ftp.directory_listing=150 Voici la liste du répertoire
ftp.file_status=213 État du fichier
ftp.system_type=215 Type UNIX: L8
ftp.help_message=214 Message d'aide suit
ftp.no_operation=200 Aucune opération
ftp.restart_marker=350 Marqueur de redémarrage {0}
ftp.rename_pending=350 Action sur fichier demandée en attente d'informations supplémentaires
ftp.file_action_complete=250 Action sur fichier demandée réussie, terminée

# Messages d'erreur de réponse FTP
ftp.err.syntax_error=500 Erreur de syntaxe, commande non reconnue
ftp.err.syntax_error_parameters=501 Erreur de syntaxe dans les paramètres ou arguments  
ftp.err.command_not_implemented=502 Commande non implémentée
ftp.err.bad_sequence=503 Mauvaise séquence de commandes
ftp.err.parameter_not_implemented=504 Commande non implémentée pour ce paramètre
ftp.err.not_logged_in=530 Non connecté
ftp.err.need_account=532 Compte requis pour stocker des fichiers
ftp.err.file_unavailable=550 Action demandée non effectuée. Fichier indisponible
ftp.err.local_error=451 Action demandée annulée. Erreur locale de traitement
ftp.err.insufficient_storage=452 Action demandée non effectuée. Espace de stockage insuffisant
ftp.err.file_name_not_allowed=553 Action demandée non effectuée. Nom de fichier non autorisé
ftp.err.page_type_unknown=551 Action demandée annulée. Type de page inconnu
ftp.err.exceeded_storage_allocation=552 Action demandée annulée. Allocation de stockage dépassée
ftp.err.invalid_username=530 Nom d'utilisateur invalide
ftp.err.invalid_password=530 Connexion incorrecte
ftp.err.account_disabled=530 Compte désactivé
ftp.err.too_many_attempts=421 Trop de tentatives de connexion échouées
ftp.err.anonymous_not_allowed=530 Connexion anonyme non autorisée
ftp.err.user_limit_exceeded=421 Trop d'utilisateurs connectés, réessayez plus tard
ftp.err.illegal_characters=500 Caractères illégaux dans la commande
ftp.err.command_unrecognized=500 Commande non reconnue: {0}
ftp.err.invalid_port_arguments=501 Arguments invalides pour la commande PORT: {0}
ftp.err.invalid_pasv_arguments=501 Arguments invalides pour la commande PASV: {0}
ftp.err.local_error=451 Action demandée annulée. Erreur locale de traitement

# Messages d'erreur d'opération sur fichier  
ftp.err.file_not_found=550 Fichier non trouvé: {0}
ftp.err.access_denied=550 Accès refusé: {0}
ftp.err.file_already_exists=550 Fichier existe déjà: {0}
ftp.err.directory_not_empty=550 Répertoire non vide: {0}
ftp.err.insufficient_space=552 Espace de stockage insuffisant
ftp.err.invalid_file_name=553 Nom de fichier invalide: {0}
ftp.err.file_system_error=550 Erreur du système de fichiers
ftp.err.operation_not_supported=502 Opération non supportée
ftp.err.file_locked=550 Fichier verrouillé: {0}
ftp.err.is_directory=550 {0} est un répertoire
ftp.err.is_file=550 {0} est un fichier
ftp.err.quota_exceeded=552 Quota dépassé

