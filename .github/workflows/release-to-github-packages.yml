name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build with Ant
        run: ant release

      - name: Deploy artifacts to GitHub Packages
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          mvn deploy:deploy-file \
            -DgroupId=org.bluezoo \
            -DartifactId=gumdrop \
            -Dversion="${VERSION}" \
            -Dpackaging=jar \
            -Dfile="dist/gumdrop-${VERSION}.jar" \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/cpkb-bluezoo/gumdrop
          mvn deploy:deploy-file \
            -DgroupId=org.bluezoo \
            -DartifactId=gumdrop-container \
            -Dversion="${VERSION}" \
            -Dpackaging=jar \
            -Dfile="dist/gumdrop-container-${VERSION}.jar" \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/cpkb-bluezoo/gumdrop
          mvn deploy:deploy-file \
            -DgroupId=org.bluezoo \
            -DartifactId=gumdrop-manager \
            -Dversion="${VERSION}" \
            -Dpackaging=war \
            -Dfile="dist/gumdrop-manager-${VERSION}.war" \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/cpkb-bluezoo/gumdrop
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
